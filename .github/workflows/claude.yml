name: Claude Code

# Triggers Claude when @claude is mentioned in an issue, PR comment, or review.
# Claude will read context, make changes, and open a fix PR (or comment).
#
# Setup (one-time, per repo):
#   1. Install the Claude GitHub App on this repository:
#      Claude Code: run `/install-github-app`
#      or manually: https://github.com/apps/claude
#   2. Add repository secret CLAUDE_CODE_OAUTH_TOKEN (the app setup flow
#      generates and stores this for you).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only run when someone actually says @claude
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
